  <text x="155" y="110" font-size="13" fill="#8b949e">AI Engineering Student · Universidade da Coruña</text>
  <text x="155" y="130" font-size="12" fill="#6e7681">📍 Lugo &amp; A Coruña, Galicia 🇪🇸  ·  2023 – 2027</text>

