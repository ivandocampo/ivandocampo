<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF"/>
      <stop offset="100%" style="stop-color:#00b894"/>
    </linearGradient>
    <linearGradient id="tag1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="tag2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b894;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00b894;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <rect width="900" height="300" rx="16" fill="url(#bg)"/>
  <rect width="900" height="300" rx="16" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>
  <circle cx="820" cy="40" r="90" fill="#00D4FF" opacity="0.03"/>
  <circle cx="850" cy="270" r="70" fill="#00b894" opacity="0.04"/>
