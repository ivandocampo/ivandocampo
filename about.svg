  <rect x="318" y="172" width="270" height="60" rx="10" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="453" y="194" text-anchor="middle" font-size="20">💻</text>
  <text x="453" y="212" text-anchor="middle" font-size="11" font-weight="600" fill="#e6edf3">Focus</text>
  <text x="453" y="226" text-anchor="middle" font-size="10" fill="#8b949e">Machine Learning · Deep Learning</text>

  <rect x="600" y="172" width="264" height="60" rx="10" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="732" y="194" text-anchor="middle" font-size="20">💼</text>
  <text x="732" y="212" text-anchor="middle" font-size="11" font-weight="600" fill="#e6edf3">Open To</text>
  <text x="732" y="226" text-anchor="middle" font-size="10" fill="#8b949e">Internships · Research · Collaborations</text>

