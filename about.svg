  <text x="450" y="252" text-anchor="middle" font-size="10" font-weight="600" fill="#6e7681" letter-spacing="1">INTERESTS</text>

  <rect x="94" y="260" width="148" height="28" rx="14" fill="url(#tag1)" stroke="#00D4FF" stroke-width="0.8" opacity="0.9"/>
  <text x="168" y="279" text-anchor="middle" font-size="12" fill="#00D4FF">⚡ Machine Learning</text>

  <rect x="252" y="260" width="132" height="28" rx="14" fill="url(#tag1)" stroke="#00D4FF" stroke-width="0.8" opacity="0.9"/>
  <text x="318" y="279" text-anchor="middle" font-size="12" fill="#00D4FF">🚀 Deep Learning</text>

  <rect x="394" y="260" width="90" height="28" rx="14" fill="url(#tag2)" stroke="#00b894" stroke-width="0.8" opacity="0.9"/>
  <text x="439" y="279" text-anchor="middle" font-size="12" fill="#00b894">🐍 Python</text>

  <rect x="494" y="260" width="152" height="28" rx="14" fill="url(#tag2)" stroke="#00b894" stroke-width="0.8" opacity="0.9"/>
  <text x="570" y="279" text-anchor="middle" font-size="12" fill="#00b894">🧠 Neural Networks</text>

  <rect x="656" y="260" width="150" height="28" rx="14" fill="url(#tag1)" stroke="#00D4FF" stroke-width="0.8" opacity="0.9"/>
  <text x="731" y="279" text-anchor="middle" font-size="12" fill="#00D4FF">👁️ Computer Vision</text>

  <rect x="0" y="297" width="900" height="3" rx="2" fill="url(#accent)" opacity="0.3"/>
